# Local full-stack run of the production images.
#
#   docker compose up --build
#   → web:  http://localhost:8080
#     api:  http://localhost:10000   (health: /healthz)
#
# Mirrors the deployed topology (separate API + static SPA) so the whole stack —
# seeded catalog, auth, CORS wiring — can be validated before shipping.

services:
  api:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      PORT: "10000"
      # The SPA origin the browser loads from — must match the `web` service.
      CORS_ORIGIN: http://localhost:8080
      APP_URL: http://localhost:8080
      DB_AUTO_MIGRATE: "true"
      DB_AUTO_SEED: "true" # local demo → seed catalog + demo accounts
      # Cookies must NOT be Secure over plain-http localhost, or the refresh
      # cookie never reaches the browser. NEVER set this false in real prod.
      COOKIE_SECURE: "false"
      # Dev-only secrets so NODE_ENV=production boots. Override for anything real:
      #   JWT_ACCESS_SECRET=... JWT_REFRESH_SECRET=... docker compose up
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-local-compose-access-secret-change-me-0123456789}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-local-compose-refresh-secret-change-me-0123456789}
      ADMIN_EMAIL: admin@sniser.io
      ADMIN_PASSWORD: ChangeMe!2026
    ports:
      - "10000:10000"
    volumes:
      - sniser-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:10000/healthz').then(r=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        # Baked into the bundle at build time — points the SPA at the api service.
        VITE_API_URL: http://localhost:10000/api/v1
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sniser-data:
