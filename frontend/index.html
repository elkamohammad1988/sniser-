<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Core SEO -->
    <title>Sniser — Money For Your Music</title>
    <meta name="description" content="Sniser is the platform that pays artists for their music. Exclusive releases, full-service production, and fan-owned content on the blockchain." />
    <meta name="keywords" content="music platform, artist royalties, fan-owned music, blockchain music, exclusive releases, NFT music access, Sniser" />
    <meta name="author" content="Sniser" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
    <meta name="googlebot" content="index, follow" />
    <link rel="canonical" href="https://sniser.example.com/" />

    <!-- Theme + viewport polish -->
    <meta name="theme-color" content="#1C1F24" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#A6E84D" media="(prefers-color-scheme: light)" />
    <meta name="color-scheme" content="dark light" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="application-name" content="Sniser" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sniser" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Sniser" />
    <meta property="og:title" content="Sniser — Money For Your Music" />
    <meta property="og:description" content="Bring the talent, we bring the booking. Exclusive releases, full-service production, fan-owned content via blockchain." />
    <meta property="og:url" content="https://sniser.example.com/" />
    <meta property="og:image" content="https://sniser.example.com/og-cover.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Sniser — Money For Your Music" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sniser — Money For Your Music" />
    <meta name="twitter:description" content="Exclusive releases, full-service production, fan-owned content via blockchain." />
    <meta name="twitter:image" content="https://sniser.example.com/og-cover.png" />

    <!-- Icons / manifest -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.svg" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Fonts (preconnect + non-blocking load) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Structured data: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Sniser",
        "url": "https://sniser.example.com/",
        "logo": "https://sniser.example.com/favicon.svg",
        "description": "Sniser is the music platform that pays artists fairly and gives fans ownership of exclusive content on the blockchain."
      }
    </script>
    <!-- Structured data: WebSite (sitelinks searchbox-ready) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Sniser",
        "url": "https://sniser.example.com/"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="padding:2rem;text-align:center;font-family:system-ui,sans-serif;color:#fff;background:#1C1F24;min-height:100vh;display:flex;align-items:center;justify-content:center;">
        <p>Sniser requires JavaScript to run. Please enable it in your browser.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
