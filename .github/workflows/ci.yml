name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Root holds the shared ESLint flat config; backend/frontend hold their own
      # deps. All three lockfiles are committed, so `npm ci` is reproducible.
      - name: Install dependencies
        run: |
          npm ci
          npm --prefix backend ci
          npm --prefix frontend ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t sniser-api ./backend
      - name: Build web image
        run: docker build -t sniser-web ./frontend
