server {
  listen       80;
  server_name  _;
  root         /usr/share/nginx/html;
  index        index.html;

  # Compress text assets on the fly.
  gzip              on;
  gzip_comp_level   6;
  gzip_min_length   1024;
  gzip_types        text/plain text/css application/javascript application/json image/svg+xml;

  # Hashed build assets are content-addressed and immutable — cache hard.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA history fallback — unknown routes render index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
